<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運転代行の集客屋｜運転代行専門Web集客パッケージ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --dark: #111318;
            --gold: #c9a84c;
            --gold-light: #e8c96a;
            --white: #f5f5f0;
            --gray: #8a8a8a;
            --red: #c0392b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Noto Sans JP', sans-serif;
            line-height: 1.7;
            overflow-x: hidden;
        }
        .site-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
        }
        .logo {
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            color: var(--gold);
            letter-spacing: 0.05em;
        }
        .header-cta {
            background: var(--gold);
            color: var(--black);
            font-weight: 700;
            font-size: 13px;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .header-cta:hover { background: var(--gold-light); }
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 24px 80px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 40%, rgba(201,168,76,0.08) 0%, transparent 70%),
                linear-gradient(180deg, #0a0a0a 0%, #111318 100%);
        }
        .hero-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .hero-inner { position: relative; max-width: 860px; }
        .hero-badge {
            display: inline-block;
            background: rgba(201,168,76,0.15);
            border: 1px solid rgba(201,168,76,0.4);
            color: var(--gold);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.15em;
            padding: 8px 20px;
            border-radius: 2px;
            margin-bottom: 32px;
        }
        .hero h1 {
            font-size: clamp(32px, 6vw, 72px);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 28px;
        }
        .hero h1 em { font-style: normal; color: var(--gold); }
        .hero-sub {
            font-size: clamp(15px, 2vw, 18px);
            color: #aaa;
            max-width: 600px;
            margin: 0 auto 48px;
        }
        .hero-btns {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: var(--gold);
            color: var(--black);
            font-weight: 700;
            font-size: 16px;
            padding: 18px 36px;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }
        .btn-secondary {
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--white);
            font-size: 15px;
            padding: 18px 32px;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
        .hero-numbers {
            display: flex;
            gap: 48px;
            justify-content: center;
            margin-top: 64px;
            padding-top: 48px;
            border-top: 1px solid rgba(255,255,255,0.08);
            flex-wrap: wrap;
        }
        .hero-num-item { text-align: center; }
        .hero-num-value {
            font-family: 'Oswald', sans-serif;
            font-size: 48px;
            color: var(--gold);
            line-height: 1;
        }
        .hero-num-label { font-size: 12px; color: var(--gray); margin-top: 6px; }
        section { padding: 100px 24px; }
        .container { max-width: 960px; margin: 0 auto; }
        .section-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
        }
        .section-title {
            font-size: clamp(26px, 4vw, 44px);
            font-weight: 900;
            line-height: 1.25;
            margin-bottom: 20px;
        }
        .section-desc {
            font-size: 16px;
            color: #aaa;
            max-width: 600px;
            margin-bottom: 56px;
        }
        .pain { background: var(--dark); }
        .pain-list { display: grid; gap: 16px; margin-bottom: 48px; }
        .pain-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
        }
        .pain-icon {
            width: 24px; height: 24px;
            background: rgba(192,57,43,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--red);
            font-size: 14px;
            font-weight: 900;
        }
        .pain-text { font-size: 15px; line-height: 1.6; }
        .pain-resolve {
            background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(201,168,76,0.05));
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 8px;
            padding: 28px 32px;
            font-size: 17px;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
        }
        .proof { background: var(--black); }
        .proof-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }
        .proof-card {
            background: rgba(201,168,76,0.05);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 8px;
            padding: 32px 24px;
            text-align: center;
            transition: all 0.2s;
        }
        .proof-card:hover { border-color: var(--gold); transform: translateY(-4px); }
        .proof-value {
            font-family: 'Oswald', sans-serif;
            font-size: 52px;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 8px;
        }
        .proof-unit { font-size: 20px; }
        .proof-label { font-size: 13px; color: #aaa; }
        .proof-note {
            background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--gold);
            padding: 20px 24px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: #aaa;
            line-height: 1.8;
        }
        .services { background: var(--dark); }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .service-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 32px;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }
        .service-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .service-card:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-4px); }
        .service-card:hover::before { opacity: 1; }
        .service-num {
            font-family: 'Oswald', sans-serif;
            font-size: 40px;
            color: rgba(201,168,76,0.2);
            line-height: 1;
            margin-bottom: 16px;
        }
        .service-title { font-size: 17px; font-weight: 700; color: var(--gold); margin-bottom: 12px; }
        .service-desc { font-size: 14px; color: #aaa; line-height: 1.75; }
